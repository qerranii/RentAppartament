name: CI/CD Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: apartment_rent_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4
    
    - name: python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
    
    - name: flake8
      run: |
        pip install flake8
        flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: tests
      env:
        DATABASE_UR1L: postgresql://user:password@localhost:5432/apartment_rent_test
        REDIS_URL: redis://localhost:6379/0
      run: |
        cd backend
        pytest -v --cov=app tests/ || true

